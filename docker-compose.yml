version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rapidoja_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rapidoja_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rapidoja_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rapidoja_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rapidoja_db?useTimezone=true&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_SHOW_SQL: true
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rapidoja_network

volumes:
  mysql_data:

networks:
  rapidoja_network:
    driver: bridge